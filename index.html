<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jempol - Portal Tracking Angkutan</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gojek: {
                            green: '#00aa13',
                            light: '#e5f6e8',
                            dark: '#008b0f',
                            black: '#1c1c1c',
                            gray: '#f5f6f6'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 flex flex-col min-h-screen font-sans text-gojek-black">

    <!-- Top Navigation / Header -->
    <header class="bg-gojek-green text-white p-5 pt-8 rounded-b-[2rem] shadow-lg sticky top-0 z-50">
        <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="#00aa13" class="w-7 h-7">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 18.75a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h6m-9 0H3.375a1.125 1.125 0 01-1.125-1.125V14.25m17.25 4.5a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h1.125c.621 0 1.129-.504 1.09-1.124a17.902 17.902 0 00-3.213-9.193 2.056 2.056 0 00-1.58-.86H14.25M16.5 18.75h-2.25m0-11.177v-.958c0-.568-.422-1.048-.987-1.106a48.554 48.554 0 00-10.026 0 1.106 1.106 0 00-.987 1.106v7.635m12-6.677v6.677m0 4.5v-4.5m0 0h-12" />
                    </svg>
                </div>
                <div>
                    <h1 class="font-bold text-xl leading-tight">Jempol Tracker</h1>
                    <p class="text-xs text-gojek-light opacity-90 font-medium tracking-wide">Jemputan Pelajar Realtime</p>
                </div>
            </div>
        </div>

        <!-- Realtime Clock Widget -->
        <div class="bg-white/10 backdrop-blur-md rounded-2xl p-4 flex items-center justify-between border border-white/20 mt-2">
            <div>
                <p id="current-date" class="text-xs font-semibold uppercase tracking-wider text-gojek-light mb-0.5">Memuat Tanggal...</p>
                <div class="flex items-baseline gap-1">
                    <h2 id="current-time" class="text-3xl font-extrabold" style="font-family: 'Space Grotesk', sans-serif;">00:00</h2>
                    <span id="current-seconds" class="text-sm font-bold opacity-80 mb-1">00</span>
                </div>
            </div>
            <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 animate-pulse">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
        </div>
    </header>

    <!-- Main Menu Area -->
    <main class="flex-grow p-6 flex flex-col max-w-lg mx-auto w-full -mt-2 bg-white rounded-t-3xl shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.1)] relative z-10 min-h-[50vh]">
        
        <div class="w-full text-left mb-6 mt-2">
            <h3 class="font-extrabold text-lg">Layanan Utama</h3>
            <p class="text-sm text-gray-500">Pilih menu di bawah ini</p>
        </div>

        <div class="grid grid-cols-4 gap-y-6 gap-x-2 w-full">
            
            <!-- Student / Peta Tracking -->
            <a href="student.html" class="flex flex-col items-center gap-2 group">
                <div class="w-14 h-14 bg-gojek-light group-hover:bg-green-200 rounded-[1.2rem] flex items-center justify-center transition-colors shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="#00aa13" class="w-7 h-7">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" />
                    </svg>
                </div>
                <span class="text-[11px] font-bold text-center leading-tight text-gray-700 group-hover:text-gojek-green transition-colors">Tracking<br>Angkot</span>
            </a>

            <!-- Driver / Masuk Sopir -->
            <a href="driver.html" class="flex flex-col items-center gap-2 group">
                <div class="w-14 h-14 bg-blue-50 group-hover:bg-blue-100 rounded-[1.2rem] flex items-center justify-center transition-colors shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="#3b82f6" class="w-7 h-7">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 9h3.75M15 12h3.75M15 15h3.75M4.5 19.5h15a2.25 2.25 0 002.25-2.25V6.75A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25v10.5A2.25 2.25 0 004.5 19.5zm6-10.125a1.875 1.875 0 11-3.75 0 1.875 1.875 0 013.75 0zm1.294 6.336a6.721 6.721 0 01-3.17.789 6.721 6.721 0 01-3.168-.789 3.376 3.376 0 016.338 0z" />
                    </svg>
                </div>
                <span class="text-[11px] font-bold text-center leading-tight text-gray-700 group-hover:text-blue-500 transition-colors">Masuk<br>Sopir</span>
            </a>

            <!-- Info Rute -->
            <a href="route.html" class="flex flex-col items-center gap-2 group">
                <div class="w-14 h-14 bg-purple-50 group-hover:bg-purple-100 rounded-[1.2rem] flex items-center justify-center transition-colors shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="#a855f7" class="w-7 h-7">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 6.75V15m6-6v8.25m.503 3.498l4.875-2.437c.381-.19.622-.58.622-1.006V4.82c0-.836-.88-1.38-1.628-1.006l-3.869 1.934c-.317.159-.69.159-1.006 0L9.503 3.252a1.125 1.125 0 00-1.006 0L3.622 5.689C3.24 5.88 3 6.27 3 6.695V19.18c0 .836.88 1.38 1.628 1.006l3.869-1.934c.317-.159.69-.159 1.006 0l4.994 2.497c.317.158.69.158 1.006 0z" />
                    </svg>
                </div>
                <span class="text-[11px] font-bold text-center leading-tight text-gray-700 group-hover:text-purple-500 transition-colors">Info<br>Rute</span>
            </a>

            <!-- Aduan -->
            <a href="#" class="flex flex-col items-center gap-2 group" onclick="alert('Fitur Aduan belum dikembangkan')">
                <div class="w-14 h-14 bg-red-50 group-hover:bg-red-100 rounded-[1.2rem] flex items-center justify-center transition-colors shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="#ef4444" class="w-7 h-7">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                </div>
                <span class="text-[11px] font-bold text-center leading-tight text-gray-700 group-hover:text-red-500 transition-colors">Kirim<br>Aduan</span>
            </a>

        </div>
    </main>

    <script>
        // Real-time Clock Logic
        function updateClock() {
            const now = new Date();
            
            // Format Hari & Tanggal (Senin, 17 Mar 2026)
            const optionsDate = { weekday: 'long', day: 'numeric', month: 'short', year: 'numeric' };
            document.getElementById('current-date').innerText = now.toLocaleDateString('id-ID', optionsDate);

            // Format Jam (10:45)
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('current-time').innerText = `${hours}:${minutes}`;

            // Format Detik (30)
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('current-seconds').innerText = seconds;
        }

        // Jalankan od detik ke 0, lalu update tiap 1 detik
        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>

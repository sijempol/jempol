<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jempol - Portal Tracking Angkutan</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gojek: {
                            green: '#00aa13',
                            light: '#e5f6e8',
                            dark: '#008b0f',
                            black: '#1c1c1c',
                            gray: '#f5f6f6'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 flex flex-col min-h-screen font-sans text-gojek-black">

    <!-- Top Navigation / Header -->
    <header class="bg-gojek-green text-white p-5 pt-8 rounded-b-[2rem] shadow-lg sticky top-0 z-50">
        <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="#00aa13" class="w-7 h-7">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 18.75a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h6m-9 0H3.375a1.125 1.125 0 01-1.125-1.125V14.25m17.25 4.5a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h1.125c.621 0 1.129-.504 1.09-1.124a17.902 17.902 0 00-3.213-9.193 2.056 2.056 0 00-1.58-.86H14.25M16.5 18.75h-2.25m0-11.177v-.958c0-.568-.422-1.048-.987-1.106a48.554 48.554 0 00-10.026 0 1.106 1.106 0 00-.987 1.106v7.635m12-6.677v6.677m0 4.5v-4.5m0 0h-12" />
                    </svg>
                </div>
                <div>
                    <h1 class="font-bold text-xl leading-tight">Jempol Tracker</h1>
                    <p class="text-xs text-gojek-light opacity-90 font-medium tracking-wide">Jemputan Pelajar Realtime</p>
                </div>
            </div>
        </div>

        <!-- Realtime Clock Widget -->
        <div class="bg-white/10 backdrop-blur-md rounded-2xl p-4 flex items-center justify-between border border-white/20 mt-2">
            <div>
                <p id="current-date" class="text-xs font-semibold uppercase tracking-wider text-gojek-light mb-0.5">Memuat Tanggal...</p>
                <div class="flex items-baseline gap-1">
                    <h2 id="current-time" class="text-3xl font-extrabold" style="font-family: 'Space Grotesk', sans-serif;">00:00</h2>
                    <span id="current-seconds" class="text-sm font-bold opacity-80 mb-1">00</span>
                </div>
            </div>
            <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 animate-pulse">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
        </div>
    </header>

    <!-- Main Menu Area -->
    <main class="flex-grow p-6 flex flex-col max-w-lg mx-auto w-full -mt-2 bg-white rounded-t-3xl shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.1)] relative z-10 min-h-[50vh]">
        
        <div class="w-full text-left mb-6 mt-2">
            <h3 class="font-extrabold text-lg">Layanan Utama</h3>
            <p class="text-sm text-gray-500">Pilih menu di bawah ini</p>
        </div>

        <div class="grid grid-cols-2 gap-6 w-full">
            
            <!-- Student / Peta Tracking -->
            <a href="student.html" class="flex flex-col items-center justify-center gap-4 p-6 bg-gojek-light/50 hover:bg-gojek-light rounded-[2.5rem] transition-all group shadow-sm hover:shadow-md border border-gojek-green/10">
                <div class="w-20 h-20 bg-white rounded-[1.8rem] flex items-center justify-center transition-transform group-hover:scale-110 shadow-sm border border-gojek-green/5">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="#00aa13" class="w-10 h-10">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" />
                    </svg>
                </div>
                <span class="text-xs font-extrabold text-center leading-tight text-gray-800 group-hover:text-gojek-green transition-colors">Tracking<br>Angkot</span>
            </a>

            <!-- Driver / Masuk Sopir -->
            <a href="driver.html" class="flex flex-col items-center justify-center gap-4 p-6 bg-blue-50/50 hover:bg-blue-50 rounded-[2.5rem] transition-all group shadow-sm hover:shadow-md border border-blue-500/10">
                <div class="w-20 h-20 bg-white rounded-[1.8rem] flex items-center justify-center transition-transform group-hover:scale-110 shadow-sm border border-blue-500/5">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="#3b82f6" class="w-10 h-10">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 9h3.75M15 12h3.75M15 15h3.75M4.5 19.5h15a2.25 2.25 0 002.25-2.25V6.75A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25v10.5A2.25 2.25 0 004.5 19.5zm6-10.125a1.875 1.875 0 11-3.75 0 1.875 1.875 0 013.75 0zm1.294 6.336a6.721 6.721 0 01-3.17.789 6.721 6.721 0 01-3.168-.789 3.376 3.376 0 016.338 0z" />
                    </svg>
                </div>
                <span class="text-xs font-extrabold text-center leading-tight text-gray-800 group-hover:text-blue-500 transition-colors">Masuk<br>Sopir</span>
            </a>

            <!-- Info Rute -->
            <a href="route.html" class="flex flex-col items-center justify-center gap-4 p-6 bg-purple-50/50 hover:bg-purple-50 rounded-[2.5rem] transition-all group shadow-sm hover:shadow-md border border-purple-500/10">
                <div class="w-20 h-20 bg-white rounded-[1.8rem] flex items-center justify-center transition-transform group-hover:scale-110 shadow-sm border border-purple-500/5">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="#a855f7" class="w-10 h-10">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 6.75V15m6-6v8.25m.503 3.498l4.875-2.437c.381-.19.622-.58.622-1.006V4.82c0-.836-.88-1.38-1.628-1.006l-3.869 1.934c-.317.159-.69.159-1.006 0L9.503 3.252a1.125 1.125 0 00-1.006 0L3.622 5.689C3.24 5.88 3 6.27 3 6.695V19.18c0 .836.88 1.38 1.628 1.006l3.869-1.934c.317-.159.69-.159 1.006 0l4.994 2.497c.317.158.69.158 1.006 0z" />
                    </svg>
                </div>
                <span class="text-xs font-extrabold text-center leading-tight text-gray-800 group-hover:text-purple-500 transition-colors">Info<br>Rute</span>
            </a>

            <!-- Aduan -->
            <a href="javascript:void(0)" class="flex flex-col items-center justify-center gap-4 p-6 bg-red-50/50 hover:bg-red-50 rounded-[2.5rem] transition-all group shadow-sm hover:shadow-md border border-red-500/10" onclick="openComplaintModal()">
                <div class="w-20 h-20 bg-white rounded-[1.8rem] flex items-center justify-center transition-transform group-hover:scale-110 shadow-sm border border-red-500/5">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="#ef4444" class="w-10 h-10">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                </div>
                <span class="text-xs font-extrabold text-center leading-tight text-gray-800 group-hover:text-red-500 transition-colors">Kirim<br>Aduan</span>
            </a>

        </div>
    </main>

    <!-- Modal Aduan -->
    <div id="complaint-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] hidden items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-3xl shadow-2xl overflow-hidden flex flex-col">
            <div class="p-5 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                <h3 class="text-lg font-extrabold text-gray-800">Pilih Kontak Aduan</h3>
                <button onclick="closeComplaintModal()" class="p-2 hover:bg-white hover:shadow-sm rounded-xl transition text-gray-400 hover:text-red-500">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div id="complaint-list" class="p-5 space-y-3 max-h-[60vh] overflow-y-auto">
                <p class="text-center text-gray-500 py-4 text-sm">Memuat kontak...</p>
            </div>
            <div class="p-5 bg-gray-50 border-t border-gray-100 italic text-[10px] text-gray-400 text-center">
                Klik salah satu kontak untuk mengirim pesan via WhatsApp.
            </div>
        </div>
    </div>

    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>

    <script>
        // Real-time Clock Logic
        function updateClock() {
            const now = new Date();
            const optionsDate = { weekday: 'long', day: 'numeric', month: 'short', year: 'numeric' };
            document.getElementById('current-date').innerText = now.toLocaleDateString('id-ID', optionsDate);
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('current-time').innerText = `${hours}:${minutes}`;
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('current-seconds').innerText = seconds;
        }

        updateClock();
        setInterval(updateClock, 1000);

        // Complaint Logic
        async function openComplaintModal() {
            const modal = document.getElementById('complaint-modal');
            const list = document.getElementById('complaint-list');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            list.innerHTML = '<p class="text-center text-gray-500 py-4 text-sm animate-pulse">Memuat kontak...</p>';
            
            try {
                const { data, error } = await supabase.from('complaints').select('*').order('name');
                if (error) throw error;
                
                if (!data || data.length === 0) {
                    list.innerHTML = '<p class="text-center text-gray-500 py-4 text-sm">Belum ada kontak aduan tersedia.</p>';
                } else {
                    list.innerHTML = '';
                    data.forEach(item => {
                        const waNumber = item.phone_number.replace(/[^0-9]/g, '');
                        const waLink = `https://wa.me/${waNumber.startsWith('0') ? '62' + waNumber.slice(1) : waNumber}`;
                        
                        const btn = document.createElement('a');
                        btn.href = waLink;
                        btn.target = "_blank";
                        btn.className = "flex items-center justify-between p-4 rounded-2xl bg-white border border-gray-100 shadow-sm hover:border-red-200 hover:bg-red-50 transition-all group";
                        btn.innerHTML = `
                            <div>
                                <p class="font-bold text-gray-800 text-sm group-hover:text-red-600">${item.name}</p>
                                <p class="text-xs text-gray-500">${item.phone_number}</p>
                            </div>
                            <div class="w-8 h-8 bg-green-500 rounded-full flex items-center justify-center text-white shadow-sm group-hover:scale-110 transition-transform">
                                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                            </div>
                        `;
                        list.appendChild(btn);
                    });
                }
            } catch (err) {
                console.error(err);
                list.innerHTML = '<p class="text-center text-red-500 py-4 text-xs font-bold">Terjadi kesalahan teknis.</p>';
            }
        }

        function closeComplaintModal() {
            const modal = document.getElementById('complaint-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Manajemen Angkutan</title>
    <!-- Tailwind CSS (via CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gojek: {
                            green: '#00aa13',
                            light: '#e5f6e8',
                            dark: '#008b0f',
                            black: '#1c1c1c',
                            gray: '#f5f6f6'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans text-gojek-black antialiased">

    <!-- Admin Login Section -->
    <div id="admin-login-section" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-3xl shadow-xl p-8 border border-gray-100">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-gojek-black rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="white" class="w-8 h-8">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
                    </svg>
                </div>
                <h1 class="text-3xl font-extrabold text-gojek-black">Panel Admin</h1>
                <p class="text-gray-500 mt-2">Sistem Tracking Angkutan</p>
            </div>
            
            <form id="admin-auth-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-bold mb-2 text-gray-700">Email Admin</label>
                    <input type="email" id="admin-email" class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-gojek-black focus:bg-white transition-all font-medium" placeholder="admin@sekolah.com" required>
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2 text-gray-700">Password</label>
                    <input type="password" id="admin-password" class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-gojek-black focus:bg-white transition-all font-medium" placeholder="••••••••" required>
                </div>
                <button type="submit" class="w-full bg-gojek-black text-white font-bold py-3.5 rounded-xl hover:bg-gray-800 transition-colors shadow-lg mt-4">
                    Masuk Ke Sistem
                </button>
            </form>
            <p id="admin-error" class="hidden text-red-500 text-sm text-center mt-4 font-bold"></p>
        </div>
    </div>

    <!-- Admin Dashboard (hidden default) -->
    <div id="admin-dashboard-section" class="hidden min-h-screen bg-gray-50">
        
        <!-- Sidebar Navigation (Responsive as header in mobile) -->
        <nav class="bg-white shadow-sm border-b border-gray-200 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gojek-black rounded-lg flex items-center justify-center text-white font-bold">A</div>
                <h2 class="font-extrabold text-xl tracking-tight">Admin<span class="text-gojek-green">Panel</span></h2>
            </div>
            <button id="admin-logout" class="text-sm font-bold text-red-500 hover:text-red-700 px-4 py-2 rounded-lg hover:bg-red-50 transition">Keluar</button>
        </nav>

        <main class="max-w-6xl mx-auto p-6 lg:p-8">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h2 class="text-2xl font-bold mb-1">Manajemen Sopir</h2>
                    <p class="text-gray-500 text-sm">Kelola daftar akun sopir yang dapat mengakses aplikasi pelacakan.</p>
                </div>
                <button id="btn-add-driver" class="bg-gojek-green text-white px-5 py-2.5 rounded-xl font-bold shadow-sm flex items-center gap-2 hover:bg-gojek-dark transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                       <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                    </svg>
                    Tambah Sopir
                </button>
            </div>

            <!-- Table Card -->
            <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 border-b border-gray-100">
                                <th class="p-4 font-bold text-gray-600 text-sm">Info Sopir</th>
                                <th class="p-4 font-bold text-gray-600 text-sm">Kendaraan & Jalur</th>
                                <th class="p-4 font-bold text-gray-600 text-sm">Kontak</th>
                                <th class="p-4 font-bold text-gray-600 text-sm">Akun Login</th>
                                <th class="p-4 font-bold text-gray-600 text-sm text-right">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="driver-table-body" class="divide-y divide-gray-100">
                            <!-- Populated by JS -->
                            <tr>
                                <td colspan="5" class="p-8 text-center text-gray-500 font-medium">Memuat data sopir...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Form (Hidden) -->
    <div id="driver-modal" class="fixed inset-0 bg-black/50 z-[100] hidden items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-3xl w-full max-w-lg shadow-2xl overflow-hidden transform transition-all">
            <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <h3 class="font-bold text-xl" id="modal-title">Tambah Akun Sopir</h3>
                <button type="button" id="btn-close-modal" class="text-gray-400 hover:text-gray-600 bg-white p-2 rounded-full shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <form id="form-driver-data" class="p-6 space-y-4 max-h-[70vh] overflow-y-auto">
                <!-- Username & Password -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-1">Username Login</label>
                        <input type="text" id="form-username" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:border-gojek-green focus:ring-1 focus:ring-gojek-green outline-none font-medium" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-1">Password</label>
                        <input type="text" id="form-password" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:border-gojek-green focus:ring-1 focus:ring-gojek-green outline-none font-medium text-red-600" required>
                        <p class="text-[10px] text-gray-400 mt-1">*Bisa dilihat oleh admin</p>
                    </div>
                </div>

                <hr class="border-gray-100 my-2">

                <!-- User Profile -->
                <div>
                     <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-1">Nama Lengkap Sopir</label>
                     <input type="text" id="form-fullname" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:border-gojek-green focus:ring-1 focus:ring-gojek-green outline-none font-medium" required>
                </div>

                <div class="grid grid-cols-2 gap-4">
                     <div>
                         <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-1">Nomor HP</label>
                         <input type="text" id="form-phone" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:border-gojek-green focus:ring-1 focus:ring-gojek-green outline-none font-medium" required>
                    </div>
                     <div>
                         <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-1">Plat Nomor</label>
                         <input type="text" id="form-plate" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:border-gojek-green focus:ring-1 focus:ring-gojek-green outline-none font-medium uppercase" required>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                     <div>
                         <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-1">Nomor Angkutan</label>
                         <input type="text" id="form-vehiclenum" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:border-gojek-green focus:ring-1 focus:ring-gojek-green outline-none font-medium" placeholder="Misal: 01 / 02">
                    </div>
                     <div>
                         <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-1">Jalur/Rute</label>
                         <input type="text" id="form-route" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:border-gojek-green focus:ring-1 focus:ring-gojek-green outline-none font-medium" required>
                    </div>
                </div>

                <button type="submit" class="w-full bg-gojek-green text-white font-bold py-3.5 rounded-xl hover:bg-gojek-dark shadow-md mt-6 transition-colors">
                    Simpan Data Sopir
                </button>
            </form>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>

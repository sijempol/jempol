<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tracking Angkutan Siswa</title>
    <!-- Tailwind CSS (via CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gojek: {
                            green: '#00aa13',
                            light: '#e5f6e8',
                            dark: '#008b0f',
                            black: '#1c1c1c',
                            gray: '#f5f6f6'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Leaflet CSS for Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f5f6f6; }
        #map { height: 100%; width: 100%; z-index: 10; }
        /* Map custom controls placement */
        .leaflet-control-container .leaflet-top { top: 80px; }
        
        /* Smooth Location Transition (5s to match polling interval) */
        .leaflet-marker-icon {
            transition: margin 5s linear, left 5s linear, top 5s linear !important;
        }

        /* Bottom Sheet Effect */
        .bottom-sheet {
            box-shadow: 0 -4px 10px rgba(0,0,0,0.05);
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
        }

        /* Pulsing animation for student icon */
        @keyframes ping-slow {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        .animate-ping-slow {
            animation: ping-slow 2s cubic-bezier(0, 0, 0.2, 1) infinite;
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden text-gojek-black flex flex-col relative">

    <!-- Top Navigation Bar / Header -->
    <header class="absolute top-0 left-0 right-0 z-50 bg-white shadow-sm p-4 flex items-center justify-between rounded-b-2xl">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gojek-green rounded-full flex items-center justify-center text-white font-bold shadow-md">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 18.75a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h6m-9 0H3.375a1.125 1.125 0 01-1.125-1.125V14.25m17.25 4.5a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h1.125c.621 0 1.129-.504 1.09-1.124a17.902 17.902 0 00-3.213-9.193 2.056 2.056 0 00-1.58-.86H14.25M16.5 18.75h-2.25m0-11.177v-.958c0-.568-.422-1.048-.987-1.106a48.554 48.554 0 00-10.026 0 1.106 1.106 0 00-.987 1.106v7.635m12-6.677v6.677m0 4.5v-4.5m0 0h-12" />
                </svg>
            </div>
            <div>
                <h1 class="font-bold text-lg leading-tight text-gojek-black">Tracking Siswa</h1>
                <p class="text-xs text-gray-500 font-medium">Realtime Angkutan Umum</p>
            </div>
        </div>
    </header>

    <!-- Map Container -->
    <main class="flex-grow relative bg-gray-200">
        <div id="map"></div>
        
        <!-- Fab Button: Center My Location -->
        <button id="btn-my-location" class="absolute bottom-64 right-4 z-[100] bg-white p-3 rounded-full shadow-lg border border-gray-100 text-blue-500 hover:bg-blue-50 transition active:scale-95">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" />
            </svg>
        </button>
    </main>

    <!-- Bottom Action Card (Gojek Bottom Sheet Style) -->
    <section class="bottom-sheet absolute bottom-0 left-0 right-0 bg-white z-50 p-5 mt-auto">
        <!-- Handle for decorative purposes -->
        <div class="w-12 h-1.5 bg-gray-300 rounded-full mx-auto mb-4"></div>
        
        <h2 class="font-bold text-lg mb-1">Status Angkutan</h2>
        <p class="text-sm text-gray-500 mb-4" id="status-text">Memuat data lokasi...</p>

        <!-- Dynamic list of nearby drivers -->
        <div id="driver-list" class="space-y-3 max-h-48 overflow-y-auto pr-2 pb-2">
            <!-- Template Item -->
            <div class="flex items-center justify-between p-3 border border-gray-100 rounded-2xl shadow-sm bg-white">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-gojek-light text-gojek-green rounded-full flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" />
                        </svg>
                    </div>
                    <div>
                        <h3 class="font-bold text-sm text-gojek-black">Angkutan 01</h3>
                        <p class="text-xs text-gray-500">B 1234 ABC • Jalur A</p>
                    </div>
                </div>
                <div class="text-right">
                    <span class="inline-block px-2 py-1 bg-green-100 text-gojek-dark text-xs font-bold rounded-full">Aktif</span>
                </div>
            </div>
        </div>
    </section>

    <!-- Leaflet JS (Deferred) -->
    <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- Supabase Client (Deferred) -->
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="js/supabase-client.js"></script>
    <script defer src="js/student.js"></script>
</body>
</html>

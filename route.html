<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Informasi Rute Angkutan</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gojek: { green: '#00aa13', light: '#e5f6e8', dark: '#008b0f', black: '#1c1c1c', gray: '#f5f6f6' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    
    <style>
        #routeMap { height: 100%; width: 100%; z-index: 10; }
        .leaflet-control-container .leaflet-top { top: 80px; }
        .bottom-sheet { box-shadow: 0 -4px 20px rgba(0,0,0,0.08); }
    </style>
</head>
<body class="bg-gray-50 flex flex-col h-screen font-sans text-gojek-black overflow-hidden relative">

    <!-- Header / Nav -->
    <header class="absolute top-0 left-0 right-0 z-50 p-4 pointer-events-none">
        <div class="flex items-center justify-between pointer-events-auto">
            <a href="index.html" class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-md text-gojek-black hover:bg-gray-50 transition active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-6 h-6 ml-[-2px]">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
                </svg>
            </a>
            <div class="bg-white px-5 py-3 rounded-full shadow-md">
                <h1 class="font-bold text-sm tracking-wide">Peta Jalur Rute</h1>
            </div>
            <div class="w-12"></div> <!-- Spacer -->
        </div>
    </header>

    <!-- Map Container -->
    <main class="flex-grow relative h-full w-full bg-gray-200">
        <div id="routeMap"></div>
    </main>

    <!-- Bottom Sheet (Daftar Rute) -->
    <section class="bottom-sheet bg-white absolute bottom-0 left-0 right-0 z-40 rounded-t-3xl flex flex-col transition-transform duration-300" style="max-height: 50vh; min-height: 250px;">
        <div class="w-full h-2 flex justify-center mt-3 cursor-grab shrink-0">
            <div class="w-12 h-1.5 bg-gray-300 rounded-full"></div>
        </div>
        
        <div class="p-6 pb-2 shrink-0">
            <h2 class="font-extrabold text-xl">Daftar Rute Tersedia</h2>
            <p class="text-sm text-gray-500 mt-1">Pilih rute untuk melihat detail dan jalurnya di peta.</p>
        </div>

        <div class="overflow-y-auto px-6 pb-8 flex-grow" id="route-list-container">
            <!-- Loading State -->
            <div class="py-10 text-center text-gray-400">
                <svg class="animate-spin h-8 w-8 mx-auto mb-3 text-gojek-green" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                <p class="font-medium text-sm">Memuat data rute...</p>
            </div>
        </div>
    </section>

    <!-- Scripts -->
    <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="js/supabase-client.js"></script>
    <script defer src="js/route.js"></script>
</body>
</html>
